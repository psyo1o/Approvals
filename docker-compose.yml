services:
  approval:
    build: .
    container_name: approval_mvp
    ports:
      - "8080:8000"
    environment:
      TZ: Asia/Seoul
      APP_SECRET: ${APP_SECRET}
      APP_ADMIN_ID: ${APP_ADMIN_ID}
      APP_ADMIN_PW: ${APP_ADMIN_PW}
      APP_DATA_DIR: /data
      QUALITY_NAS_ROOT: "/nas_quality"
      DATABASE_URL: ${DATABASE_URL:-}
      ALLOWED_IPS: ${ALLOWED_IPS:-}
      SESSION_IDLE_SECONDS: ${SESSION_IDLE_SECONDS:-7200}
      SESSION_ABSOLUTE_SECONDS: ${SESSION_ABSOLUTE_SECONDS:-2592000}
      TRUST_PROXY: ${TRUST_PROXY:-}
    volumes:
      - ./app:/app
      - ./data:/data
      - "/volume1/품질문서/(주)영동환경이앤텍 품질문서:/nas_quality:ro"
    restart: unless-stopped
