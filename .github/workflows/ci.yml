name: CI - Build, Run & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run import + basic endpoint test
        run: |
          python run_local_test.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image and load into runner
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          load: true
          tags: approval_mvp:ci

      - name: Run container
        run: |
          docker run -d --name approval_ci -p 8000:8000 approval_mvp:ci || true

      - name: Wait for server to become ready
        run: |
          for i in {1..30}; do
            if curl -sS http://localhost:8000/ >/dev/null 2>&1; then
              echo "server ready"; break
            fi
            echo "waiting..."; sleep 1
          done

      - name: Collect container logs
        run: |
          docker logs approval_ci > approval_ci_logs.txt || true

      - name: Upload logs artifact
        uses: actions/upload-artifact@v4
        with:
          name: approval-ci-logs
          path: approval_ci_logs.txt

      - name: Stop and remove container
        if: always()
        run: |
          docker rm -f approval_ci || true
