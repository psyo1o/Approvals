{% extends "base.html" %}
{% block content %}
<div class="card">
  <h3>사용자 수정</h3>
  <div class="muted" style="margin-bottom:10px;">
    <a href="/admin/users">← 사용자관리로</a>
  </div>

  <div class="card">
    <form method="post" action="/admin/users/{{u.id}}/edit">
      <div class="row">
        <div style="flex:1; min-width:220px;">
          <label>아이디</label>
          <input value="{{u.username}}" disabled>
        </div>
        <div style="flex:1; min-width:220px;">
          <label>이름</label>
          <input name="name" value="{{u.name}}">
        </div>
        <div style="flex:1; min-width:220px;">
          <label>부서</label>
          <input name="dept" value="{{u.dept}}">
        </div>
        <div style="flex:1; min-width:220px;">
          <label>직급</label>
          <select name="grade_id">
            <option value="">(선택)</option>
            {% for g in grades %}
              <option value="{{g.id}}" {% if u.grade == g.name %}selected{% endif %}>{{g.name}}</option>
            {% endfor %}
          </select>
          <div class="muted">목록에 없으면 직접 입력</div>
          <input name="grade" value="{{u.grade}}">
        </div>
      </div>

      <div class="row" style="margin-top:8px;">
        <div style="width:160px;">
          <label>관리자?</label>
          <select name="is_admin">
            <option value="0" {% if not u.is_admin %}selected{% endif %}>아니오</option>
            <option value="1" {% if u.is_admin %}selected{% endif %}>예</option>
          </select>
        </div>
        <div style="width:160px;">
          <label>활성?</label>
          <select name="is_active">
            <option value="1" {% if u.is_active %}selected{% endif %}>예</option>
            <option value="0" {% if not u.is_active %}selected{% endif %}>아니오</option>
          </select>
        </div>
        <div style="width:200px;">
          <label>초기변경 강제?</label>
          <select name="must_change_pw">
            <option value="0" {% if not u.must_change_pw %}selected{% endif %}>아니오</option>
            <option value="1" {% if u.must_change_pw %}selected{% endif %}>예</option>
          </select>
        </div>
      </div>

      <div class="row" style="margin-top:8px;">
        <div style="flex:1; min-width:260px;">
          <label>새 비밀번호 (비우면 변경 안함)</label>
          <input name="new_pw" placeholder="입력 시 비번 변경 + 최초변경 강제">
        </div>
      </div>

      <div style="margin-top:12px;">
        <button class="btn" type="submit">저장</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
