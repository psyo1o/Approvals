{% extends "base.html" %}
{% block content %}
<div class="row items-center mb-6">
  <a href="/board/{{ board.id }}" class="btn ghost btn-sm">&larr; 목록으로</a>
  <h2 style="margin: 0; margin-left: 1rem;">새 게시글 작성 - {{ board.name }}</h2>
</div>

<form method="POST" action="/board/{{ board.id }}/new" class="card">
  <div class="form-group mb-4">
    <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">제목</label>
    <input type="text" name="title" class="form-control" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px; outline: none; transition: border-color 0.15s;" required placeholder="게시글 제목을 입력하세요" autofocus>
  </div>
  <div class="form-group mb-6">
    <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">내용</label>
    <textarea name="content" class="form-control" rows="15" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px; outline: none; transition: border-color 0.15s; resize: vertical;" placeholder="내용을 작성하세요"></textarea>
  </div>
  <div class="row" style="display: flex; justify-content: flex-end; gap: 1rem;">
    <a href="/board/{{ board.id }}" class="btn ghost" style="padding: 0.75rem 1.5rem;">취소</a>
    <button type="submit" class="btn primary" style="padding: 0.75rem 2rem;">등록하기</button>
  </div>
</form>

<style>
.form-control:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}
</style>
{% endblock %}
