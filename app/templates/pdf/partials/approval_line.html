{# 결재선: order_no 오름차순 → 가로 배치 (APPROVED만) #}
{% if approvers %}
<div style="text-align:right; width:100%; padding:0 10pt 0 0; box-sizing:border-box;">
  <table cellspacing="0" cellpadding="0" style="border-collapse:collapse; display:inline-table; font-family:PdfKorean,sans-serif; font-size:9pt; line-height:1.25; color:#111;">
    <tr>
      <th style="border:1px solid #333; padding:5pt 6pt; text-align:center; vertical-align:middle; background:#f3f4f6; font-weight:700; min-width:26pt; width:26pt;">결재</th>
      {% for a in approvers %}
      <th style="border:1px solid #333; border-left:none; padding:5pt 8pt; text-align:center; vertical-align:middle; background:#fafafa; font-weight:600; min-width:52pt;">{{ a.grade }}</th>
      {% endfor %}
    </tr>
    <tr>
      <td style="border:1px solid #333; border-top:none; padding:6pt 6pt; text-align:center; vertical-align:middle; background:#f3f4f6; font-weight:700;">결재</td>
      {% for a in approvers %}
      <td style="border:1px solid #333; border-left:none; border-top:none; padding:6pt 8pt; text-align:center; vertical-align:middle; font-weight:500; min-width:52pt;">{{ a.name }}</td>
      {% endfor %}
    </tr>
    <tr>
      <td style="border:1px solid #333; border-top:none; padding:4pt 6pt; text-align:center; vertical-align:middle; background:#f9fafb; font-size:8pt; color:#444;">일시</td>
      {% for a in approvers %}
      <td style="border:1px solid #333; border-left:none; border-top:none; padding:4pt 6pt; text-align:center; vertical-align:middle; font-size:8pt; color:#333; white-space:nowrap;">{{ a.acted_at }}</td>
      {% endfor %}
    </tr>
  </table>
</div>
{% else %}
<p style="text-align:right; font-size:9pt; color:#888; margin:0;">결재 정보 없음</p>
{% endif %}
