<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>결재 이력</title>
  <style>
    @page { size: A4; margin: 16mm; }
    @font-face { font-family: PdfKorean; src: url(pdf-korean.ttf); }
    body { font-family: PdfKorean, sans-serif; font-size: 10pt; color: #111; }
    h1 { font-size: 14pt; margin: 0 0 10pt 0; }
    h2 { font-size: 11pt; margin: 14pt 0 6pt 0; }
    .stamp-row { margin-bottom: 12pt; overflow: hidden; }
    .log { font-size: 9pt; color: #333; margin: 0 0 4pt 0; }
  </style>
</head>
<body>
  <div class="stamp-row">
    {% include "pdf/partials/approval_line.html" %}
  </div>
  <h1>결재 이력 — {{ doc.title or doc.id }}</h1>
  <h2>이벤트 로그</h2>
  {% for ev in events %}
  <p class="log">{{ ev.at }} · {{ ev.event }} · {{ ev.user_name }} · {{ ev.note }}</p>
  {% else %}
  <p class="log">이벤트 없음</p>
  {% endfor %}
</body>
</html>
