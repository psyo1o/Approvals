{% extends "base.html" %}
{% block content %}

<!-- FullCalendar 6 CDN -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<style>
  /* ---------- 달력 레이아웃 ---------- */
  .cal-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:14px; }
  .cal-header h2 { margin:0; }

  /* 범례 */
  .cal-legend { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:14px; font-size:13px; }
  .cal-legend-item { display:flex; align-items:center; gap:5px; cursor:pointer; padding:3px 8px; border-radius:6px; border:1px solid var(--border); }
  .cal-legend-item.inactive { opacity:.35; }
  .cal-legend-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }

  /* 달력 높이 */
  #calendar { min-height: 500px; }

  /* ---------- 모달 공용 ---------- */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.45);
    z-index:1000; justify-content:center; align-items:center; padding:16px;
  }
  .modal-overlay.open { display:flex; }
  .modal-box { background:var(--card,#fff); border:1px solid var(--border,#e5e7eb); border-radius:14px; width:100%; max-width:480px; padding:20px; max-height:90vh; overflow-y:auto; }
  .modal-title { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .modal-title h3 { margin:0; }
  .form-row { margin-bottom:12px; }
  .form-row label { display:block; font-size:13px; margin-bottom:4px; font-weight:600; }
  .form-row-inline { display:flex; gap:10px; }
  .form-row-inline > div { flex:1; }

  /* ---------- 모바일 반응형 ---------- */
  @media (max-width: 768px) {
    .cal-header { flex-direction:column; align-items:flex-start; }
    #calendar { min-height: 350px; }
    .fc .fc-toolbar { flex-direction:column; gap:6px; }
    .fc .fc-toolbar-chunk { display:flex; justify-content:center; }
    .fc .fc-button { padding:4px 8px; font-size:12px; }
    .form-row-inline { flex-direction:column; gap:8px; }
    .cal-legend { gap:6px; font-size:12px; }
    .trip-member-grid { max-height:160px; }
  }
  .trip-member-grid {
    display:flex; flex-wrap:wrap; gap:8px; max-height:220px; overflow-y:auto;
    padding:8px; border:1px solid var(--border); border-radius:8px; background:#f8fafc;
  }
  .trip-member-chip {
    display:flex; align-items:flex-start; gap:6px; font-size:13px; padding:6px 8px;
    border:1px solid var(--border); border-radius:8px; background:#fff; cursor:pointer;
  }
  .trip-member-chip input { margin-top:3px; flex-shrink:0; }
</style>

<!-- 헤더 -->
<div class="cal-header">
  <h2>사내 일정 관리</h2>
  <button class="btn primary" onclick="openAddModal()">+ 일정 추가</button>
</div>

<!-- 범례 (클릭 시 필터 토글) -->
<div class="cal-legend" id="calLegend">
  <div class="cal-legend-item" data-type="LEAVE" onclick="toggleFilter(this)">
    <span class="cal-legend-dot" style="background:#ef4444"></span> 휴가
  </div>
  <div class="cal-legend-item" data-type="COMPANY" onclick="toggleFilter(this)">
    <span class="cal-legend-dot" style="background:#2563eb"></span> 전체일정
  </div>
  <div class="cal-legend-item" data-type="TEAM_1" onclick="toggleFilter(this)">
    <span class="cal-legend-dot" style="background:#f59e0b"></span> 측정팀1
  </div>
  <div class="cal-legend-item" data-type="TEAM_2" onclick="toggleFilter(this)">
    <span class="cal-legend-dot" style="background:#10b981"></span> 측정팀2
  </div>
  <div class="cal-legend-item" data-type="TEAM_3" onclick="toggleFilter(this)">
    <span class="cal-legend-dot" style="background:#8b5cf6"></span> 측정팀3
  </div>
  <div class="cal-legend-item" data-type="TEAM_4" onclick="toggleFilter(this)">
    <span class="cal-legend-dot" style="background:#ec4899"></span> 측정팀4
  </div>
  <div class="cal-legend-item" data-type="TEAM_5" onclick="toggleFilter(this)">
    <span class="cal-legend-dot" style="background:#06b6d4"></span> 측정팀5
  </div>
  <div class="cal-legend-item" data-type="LEGACY" onclick="toggleFilter(this)">
    <span class="cal-legend-dot" style="background:#6b7280"></span> 기타(개인)
  </div>
</div>

<!-- 달력 본체 -->
<div class="card" style="padding:12px;">
  <div id="calendar"></div>
</div>

<!-- ===== 일정 추가 모달 ===== -->
<div class="modal-overlay" id="addModal">
  <div class="modal-box">
    <div class="modal-title">
      <h3>새 일정 추가</h3>
      <button class="btn ghost" onclick="closeModal('addModal')">닫기</button>
    </div>
    <form method="POST" action="/api/schedules">
      <div class="form-row">
        <label>일정 유형</label>
        <select name="schedule_type" id="add_schedule_type" onchange="toggleTripMembers()">
          {% for k, v in schedule_types.items() %}
            {% if k != 'LEAVE' %}
            <option value="{{ k }}">{{ v }}</option>
            {% endif %}
          {% endfor %}
        </select>
      </div>
      <div class="form-row" id="trip_members_row" style="display:none;">
        <label>출장자 (선택, 복수 가능)</label>
        <p class="muted small" style="margin:0 0 8px 0;">측정팀 일정 기간 중 출장 인원. 주말·평일 업무일지·근무 판정에 반영됩니다.</p>
        <div class="trip-member-grid">
          {% for u in branch_users %}
          <label class="trip-member-chip">
            <input type="checkbox" name="trip_user_ids" value="{{ u.id }}">
            <span>{{ u.name }} <span class="muted">· {{ u.dept or '부서미지정' }} · {{ u.grade or '-' }}</span></span>
          </label>
          {% endfor %}
        </div>
      </div>
      <div class="form-row">
        <label>제목</label>
        <input type="text" name="title" required placeholder="예: ○○지역 측정, 팀 미팅 등">
      </div>
      <div class="form-row-inline">
        <div class="form-row">
          <label>시작일</label>
          <input type="date" name="start_date" id="add_start" required>
        </div>
        <div class="form-row">
          <label>종료일</label>
          <input type="date" name="end_date" id="add_end">
        </div>
      </div>
      <div class="form-row">
        <label>메모 (선택)</label>
        <textarea name="memo" rows="3" style="min-height:60px;" placeholder="상세 내용"></textarea>
      </div>
      <div style="text-align:right; margin-top:14px;">
        <button class="btn primary" type="submit">저장</button>
      </div>
    </form>
  </div>
</div>

<!-- ===== 일정 상세 모달 ===== -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <div class="modal-title">
      <h3 id="det_title" style="color:var(--primary);">일정 제목</h3>
      <button class="btn ghost" onclick="closeModal('detailModal')">닫기</button>
    </div>
    <div style="font-size:14px; line-height:1.7; margin-bottom:14px;">
      <p><strong>유형:</strong> <span id="det_type"></span></p>
      <p><strong>기간:</strong> <span id="det_period"></span></p>
      <p><strong>등록자:</strong> <span id="det_user"></span></p>
      <p id="det_trip_row"><strong>출장자:</strong> <span id="det_trip"></span></p>
      <p><strong>메모:</strong><br><span id="det_memo" style="white-space:pre-wrap;"></span></p>
    </div>
    <div id="det_actions" style="text-align:right;"></div>
  </div>
</div>

<script>
const ME_ID = {{ me.id }};
const IS_ADMIN = {{ 'true' if me.is_admin else 'false' }};
let calendar;
let hiddenTypes = new Set();

function openAddModal() {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('add_start').value = today;
  document.getElementById('add_end').value = today;
  toggleTripMembers();
  document.getElementById('addModal').classList.add('open');
}
function toggleTripMembers() {
  var sel = document.getElementById('add_schedule_type');
  var row = document.getElementById('trip_members_row');
  if (!sel || !row) return;
  var isTeam = (sel.value || '').indexOf('TEAM_') === 0;
  row.style.display = isTeam ? '' : 'none';
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function toggleFilter(el) {
  const t = el.dataset.type;
  if (hiddenTypes.has(t)) { hiddenTypes.delete(t); el.classList.remove('inactive'); }
  else { hiddenTypes.add(t); el.classList.add('inactive'); }
  calendar.refetchEvents();
}

function shouldShow(ev) {
  const props = ev.extendedProps || {};
  if (props.source === 'schedule') return !hiddenTypes.has(props.schedule_type);
  return !hiddenTypes.has('LEGACY');
}

document.addEventListener('DOMContentLoaded', function() {
  var calEl = document.getElementById('calendar');
  var isMobile = window.innerWidth < 768;

  calendar = new FullCalendar.Calendar(calEl, {
    initialView: isMobile ? 'listMonth' : 'dayGridMonth',
    locale: 'ko',
    height: 'auto',
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: isMobile ? 'listMonth,dayGridMonth' : 'dayGridMonth,timeGridWeek,listMonth'
    },
    buttonText: { today:'오늘', month:'월', week:'주', list:'목록' },
    events: function(info, successCallback, failureCallback) {
      fetch('/api/schedules')
        .then(r => r.json())
        .then(data => {
          var filtered = data.filter(function(ev) {
            var props = ev.extendedProps || {};
            if (props.source === 'schedule') return !hiddenTypes.has(props.schedule_type);
            return !hiddenTypes.has('LEGACY');
          });
          successCallback(filtered);
        })
        .catch(failureCallback);
    },
    eventClick: function(info) {
      var ev = info.event;
      var p = ev.extendedProps || {};
      document.getElementById('det_title').innerText = ev.title;
      document.getElementById('det_type').innerText = p.schedule_type_ko || (p.source === 'calendar_event' ? '개인일정' : '-');

      var period = ev.start ? ev.start.toLocaleDateString('ko-KR') : '';
      if (ev.end) period += ' ~ ' + ev.end.toLocaleDateString('ko-KR');
      if (ev.allDay) period += ' (종일)';
      document.getElementById('det_period').innerText = period;
      document.getElementById('det_user').innerText = p.user_name || '';
      var tripEl = document.getElementById('det_trip');
      if (tripEl) {
        if (p.trip_user_names && p.trip_user_names.length) {
          tripEl.innerText = p.trip_user_names.join(', ');
          tripEl.parentElement.style.display = '';
        } else {
          tripEl.innerText = '-';
          tripEl.parentElement.style.display = 'none';
        }
      }
      document.getElementById('det_memo').innerText = p.memo || p.description || '내용 없음';

      var act = document.getElementById('det_actions');
      act.innerHTML = '';
      if (p.editable) {
        var form = document.createElement('form');
        form.method = 'POST';
        if (p.source === 'schedule') {
          form.action = '/api/schedules/' + p.schedule_id + '/delete';
        } else {
          form.action = '/api/events/' + p.event_id + '/delete';
        }
        form.onsubmit = function(){ return confirm('이 일정을 삭제하시겠습니까?'); };
        var btn = document.createElement('button');
        btn.type = 'submit'; btn.className = 'btn danger'; btn.innerText = '삭제';
        form.appendChild(btn);
        act.appendChild(form);
      }
      if (p.document_id) {
        var link = document.createElement('a');
        link.href = '/doc/' + p.document_id;
        link.className = 'btn ghost';
        link.style.marginRight = '8px';
        link.innerText = '결재문서 보기';
        act.prepend(link);
      }

      document.getElementById('detailModal').classList.add('open');
    },
    windowResize: function(arg) {
      if (window.innerWidth < 768) {
        calendar.changeView('listMonth');
      }
    }
  });
  calendar.render();
});
</script>
{% endblock %}
