{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:520px;">
  <h3>비밀번호 변경 (최초 로그인 필수)</h3>
  <form method="post" action="/change-password">
    <label>현재 비밀번호</label>
    <input type="password" name="current_pw" required>
    <label style="margin-top:8px;">새 비밀번호</label>
    <input type="password" name="new_pw" required>
    <label style="margin-top:8px;">새 비밀번호 확인</label>
    <input type="password" name="new_pw2" required>
    <div style="margin-top:12px;">
      <button class="btn" type="submit">변경</button>
    </div>
  </form>
</div>
{% endblock %}
