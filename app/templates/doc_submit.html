{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2 style="margin:0 0 8px 0;">결재선 지정 및 상신</h2>
  <p class="muted small">문서: <strong>{{ doc.title }}</strong> ({{ doctype_ko(doc.doc_type) }})</p>
  {% if error %}<div class="flash" style="margin-top:10px;">{{ error }}</div>{% endif %}

  <form method="post" action="/doc/{{ doc.id }}/submit" style="margin-top:16px;">
    <label>결재 모드</label>
    <select name="mode" class="input-sm" style="margin-bottom:12px;">
      <option value="SEQUENTIAL" selected>순차 (기본)</option>
      <option value="PARALLEL">병렬 (전원 승인)</option>
    </select>
    <div class="muted small" style="margin-bottom:16px;">순차: 위에서 아래 순서로 결재 · 병렬: 지정한 결재자가 동시에 결재</div>

    <div id="approver-box" style="display:grid;grid-template-columns:1fr;gap:10px">
      <div>
        <label>1차 결재자</label>
        <select name="approver1" required>
          <option value="">(선택)</option>
          {% for u in users %}
            <option value="{{ u.id }}">{{ u.name }} ({{ u.username }}){% if u.is_admin %} · 관리자{% endif %}</option>
          {% endfor %}
        </select>
      </div>
      {% for n in [2,3,4,5] %}
      <div class="ap-row" data-n="{{ n }}" style="display:none">
        <label>{{ n }}차 결재자</label>
        <select name="approver{{ n }}" disabled>
          <option value="">(선택 안함)</option>
          {% for u in users %}
            <option value="{{ u.id }}">{{ u.name }} ({{ u.username }}){% if u.is_admin %} · 관리자{% endif %}</option>
          {% endfor %}
        </select>
      </div>
      {% endfor %}
    </div>

    <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
      <button type="button" class="btn ghost small" id="btn-add-approver">+ 결재자 추가</button>
      <button type="button" class="btn ghost small" id="btn-remove-approver">− 마지막 제거</button>
      <span class="muted small">최대 5명</span>
    </div>

    <div class="row" style="margin-top:20px; justify-content:flex-end; gap:8px;">
      <a class="btn ghost" href="/doc/{{ doc.id }}">취소</a>
      <button class="btn primary" type="submit">상신</button>
    </div>
  </form>
</div>

<script>
(function(){
  const rows = Array.from(document.querySelectorAll("#approver-box .ap-row"));
  const addBtn = document.getElementById("btn-add-approver");
  const rmBtn  = document.getElementById("btn-remove-approver");
  function visibleRows(){ return rows.filter(r => r.style.display !== "none"); }
  function showNext(){
    const next = rows.find(r => r.style.display === "none");
    if(!next){ alert("결재자는 최대 5명까지 가능합니다."); return; }
    next.style.display = "";
    const sel = next.querySelector("select");
    if(sel){ sel.disabled = false; }
  }
  function hideLast(){
    const vis = visibleRows();
    if(vis.length === 0){ return; }
    const last = vis[vis.length - 1];
    const sel = last.querySelector("select");
    if(sel){ sel.value = ""; sel.disabled = true; }
    last.style.display = "none";
  }
  addBtn && addBtn.addEventListener("click", showNext);
  rmBtn  && rmBtn.addEventListener("click", hideLast);
})();
</script>
{% endblock %}
