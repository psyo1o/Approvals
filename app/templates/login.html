{% extends "base.html" %}
{% block content %}
<div style="display:flex; justify-content:center; align-items:center; min-height:calc(100vh - 200px);">
  <div class="card" style="width:100%; max-width:420px;">
    <div style="text-align:center; margin-bottom:20px;">
      <span class="brand-mark" style="display:inline-flex; margin-bottom:12px;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
      </span>
      <h2 style="margin:0 0 4px;">로그인</h2>
      <p class="muted" style="margin:0;">영동환경이앤텍 전자결재</p>
    </div>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <div class="grid1" style="gap:14px;">
        <div>
          <label>아이디</label>
          <input name="username" required autocomplete="username" placeholder="사번 또는 아이디">
        </div>
        <div>
          <label>비밀번호</label>
          <input type="password" name="password" required autocomplete="current-password" placeholder="비밀번호">
        </div>
      </div>
      <div style="margin-top:18px;">
        <button class="btn primary" type="submit" style="width:100%; padding:12px;">로그인</button>
      </div>
      <p class="muted" style="margin-top:14px; text-align:center; font-size:12px;">
        초기 관리자: env(APP_ADMIN_ID / APP_ADMIN_PW)
      </p>
    </form>
  </div>
</div>
{% endblock %}
